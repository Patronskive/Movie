<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Film- og serieguide</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d0d0d; --surface: #161616; --surface2: #1e1e1e; --border: #2a2a2a;
    --text: #f0f0ee; --text-muted: #888; --text-dim: #555;
    --accent: #e8c97a; --accent-dim: rgba(232,201,122,0.12);
    --accent2: #7ab8e8; --accent2-dim: rgba(122,184,232,0.12);
    --radius: 10px; --font: 'Inter', system-ui, sans-serif;
  }
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
  body { background: var(--bg); color: var(--text); font-family: var(--font); font-size: 15px; line-height: 1.5; min-height: 100vh; }
  header { padding: 2rem 1.5rem 1rem; max-width: 1100px; margin: 0 auto; }
  header h1 { font-size: 22px; font-weight: 600; letter-spacing: -0.02em; }
  .media-tabs { display: flex; gap: 0; margin-top: 1rem; border-bottom: 1px solid var(--border); }
  .media-tab { padding: 10px 24px; font-size: 14px; font-weight: 500; cursor: pointer; border: none; background: transparent; color: var(--text-muted); font-family: var(--font); border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.15s; }
  .media-tab:hover { color: var(--text); }
  .media-tab.active-film { color: var(--accent); border-bottom-color: var(--accent); }
  .media-tab.active-serie { color: var(--accent2); border-bottom-color: var(--accent2); }
  .main { max-width: 1100px; margin: 0 auto; padding: 1.5rem; }
  .search-panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem; margin-bottom: 1.5rem; }
  .tabs { display: flex; gap: 6px; margin-bottom: 1rem; flex-wrap: wrap; }
  .tab { padding: 5px 14px; border-radius: 999px; border: 1px solid var(--border); background: transparent; color: var(--text-muted); font-size: 13px; cursor: pointer; transition: all 0.15s; font-family: var(--font); }
  .tab:hover { border-color: #444; color: var(--text); }
  .tab.active-film { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
  .tab.active-serie { background: var(--accent2-dim); border-color: var(--accent2); color: var(--accent2); }
  .search-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 8px; }
  .filter-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  input[type=text], input[type=number], select {
    background: var(--surface2); border: 1px solid var(--border); color: var(--text);
    border-radius: 7px; padding: 8px 12px; font-size: 14px; font-family: var(--font);
    outline: none; transition: border-color 0.15s;
  }
  .mode-film input[type=text]:focus, .mode-film input[type=number]:focus, .mode-film select:focus { border-color: var(--accent); }
  .mode-serie input[type=text]:focus, .mode-serie input[type=number]:focus, .mode-serie select:focus { border-color: var(--accent2); }
  input[type=text] { flex: 1; min-width: 160px; }
  input[type=number] { width: 72px; }
  select { cursor: pointer; }
  .score-label { font-size: 13px; color: var(--text-muted); white-space: nowrap; display: flex; align-items: center; gap: 6px; }
  .btn { border: none; border-radius: 7px; padding: 8px 20px; font-size: 14px; font-weight: 500; cursor: pointer; font-family: var(--font); transition: opacity 0.15s; white-space: nowrap; }
  .btn-film { background: var(--accent); color: #111; }
  .btn-serie { background: var(--accent2); color: #111; }
  .btn:hover { opacity: 0.88; }
  .status { text-align: center; color: var(--text-muted); font-size: 14px; padding: 3rem 0; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; cursor: pointer; transition: border-color 0.15s, transform 0.15s; }
  .card:hover { border-color: #444; transform: translateY(-2px); }
  .card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; display: block; background: var(--surface2); }
  .no-poster { width: 100%; aspect-ratio: 2/3; background: var(--surface2); display: flex; align-items: center; justify-content: center; color: var(--text-dim); font-size: 28px; }
  .card-info { padding: 8px 9px 10px; }
  .score { display: inline-block; border-radius: 4px; padding: 1px 6px; font-size: 11px; font-weight: 600; margin-bottom: 4px; }
  .score-film { background: var(--accent-dim); color: var(--accent); }
  .score-serie { background: var(--accent2-dim); color: var(--accent2); }
  .card-title { font-size: 12px; font-weight: 500; color: var(--text); line-height: 1.3; }
  .card-year { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
  .card-providers { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; min-height: 18px; }
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 100; align-items: center; justify-content: center; padding: 1rem; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; max-width: 500px; width: 100%; max-height: 88vh; overflow-y: auto; position: relative; }
  .modal-close { position: absolute; top: 12px; right: 12px; background: var(--surface2); border: 1px solid var(--border); color: var(--text-muted); border-radius: 50%; width: 30px; height: 30px; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 1; font-family: var(--font); }
  .modal-close:hover { color: var(--text); }
  .modal-poster { width: 100%; max-height: 340px; object-fit: cover; object-position: center 20%; border-radius: 14px 14px 0 0; display: block; }
  .modal-body { padding: 1.25rem; }
  .modal-title { font-size: 18px; font-weight: 600; letter-spacing: -0.01em; margin-bottom: 6px; }
  .modal-scores { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
  .score-pill { border-radius: 6px; padding: 3px 10px; font-size: 13px; font-weight: 500; }
  .score-pill-film { background: var(--accent-dim); color: var(--accent); }
  .score-pill-serie { background: var(--accent2-dim); color: var(--accent2); }
  .score-pill.rt { background: rgba(250,100,60,0.12); color: #fa6020; }
  .section-label { font-size: 11px; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 5px; margin-top: 14px; }
  .modal-text { font-size: 13px; color: #aaa; line-height: 1.6; }
  .providers { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 5px; }
  .provider { display: flex; align-items: center; gap: 6px; background: var(--surface2); border: 1px solid var(--border); border-radius: 7px; padding: 5px 10px; font-size: 12px; color: var(--text); text-decoration: none; }
  .provider img { width: 20px; height: 20px; border-radius: 4px; }
  .provider-label { font-size: 10px; color: var(--text-dim); margin-left: 2px; }
  .justwatch-link { display: inline-block; margin-top: 10px; font-size: 12px; color: var(--accent); text-decoration: none; opacity: 0.8; }
  .justwatch-link:hover { opacity: 1; }
  .no-providers { font-size: 13px; color: var(--text-dim); margin-top: 4px; }
  @media (max-width: 480px) {
    .search-row, .filter-row { flex-direction: column; align-items: stretch; }
    .btn { width: 100%; }
    .grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); }
  }
</style>
</head>
<body>
<header>
  <h1>Film- og serieguide</h1>
  <div class="media-tabs">
    <button class="media-tab active-film" id="mtab-film" onclick="setMedia('film')">🎬 Filmer</button>
    <button class="media-tab" id="mtab-serie" onclick="setMedia('serie')">📺 Serier</button>
  </div>
</header>
<main class="main mode-film" id="main">
  <div class="search-panel">
    <div class="tabs" id="search-tabs">
      <button class="tab active-film" id="tab-person" onclick="setType('person')">Regissør / skuespiller</button>
      <button class="tab" id="tab-title" onclick="setType('title')">Tittel</button>
      <button class="tab" id="tab-discover" onclick="setType('discover')">Utforsk</button>
    </div>
    <div id="row-person" class="search-row">
      <input type="text" id="query-person" placeholder="F.eks. David Fincher" autocomplete="off"/>
      <select id="role-select">
        <option value="directing">Regissør</option>
        <option value="acting">Skuespiller</option>
      </select>
    </div>
    <div id="row-title" class="search-row" style="display:none">
      <input type="text" id="query-title" placeholder="F.eks. Fight Club" autocomplete="off"/>
    </div>
    <div id="row-discover" class="filter-row" style="display:none">
      <select id="genre-select"><option value="">Alle sjangere</option></select>
      <select id="decade-select">
        <option value="">Alle tiår</option>
        <option value="1950">1950-tallet</option>
        <option value="1960">1960-tallet</option>
        <option value="1970">1970-tallet</option>
        <option value="1980">1980-tallet</option>
        <option value="1990">1990-tallet</option>
        <option value="2000">2000-tallet</option>
        <option value="2010">2010-tallet</option>
        <option value="2020">2020-tallet</option>
      </select>
    </div>
    <div class="filter-row" style="margin-top:8px">
      <span class="score-label">Min score <input type="number" id="min-score" value="7" min="0" max="10" step="0.1"/></span>
      <button class="btn btn-film" id="search-btn" onclick="search()">Søk</button>
    </div>
  </div>
  <div id="status" class="status" style="display:none"></div>
  <div class="grid" id="results"></div>
</main>
<div class="modal-overlay" id="overlay" onclick="handleOverlayClick(event)">
  <div class="modal" id="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div id="modal-inner"></div>
  </div>
</div>
<script>
const TOKEN = 'eyJhbGciOiJIUzI1NiJ9.eyJhdWQiOiI3ZjlmZGUwOWE3ZTU3MzAwNTU4YzgwOTQzZjgxNGJkNiIsIm5iZiI6MTc4MjU1Nzg1Mi40MDQsInN1YiI6IjZhM2ZhYzljNWE5NWU2MWY3NGIwODU4YyIsInNjb3BlcyI6WyJhcGlfcmVhZCJdLCJ2ZXJzaW9uIjoxfQ.hb2uEVAyNDiKfL2Ph4XEF3Y3az-ISIIEyZ3hx8IHZ3o';
const OMDB_KEY = '90c2bdc6';
const H = { Authorization: 'Bearer ' + TOKEN };
const IMG = 'https://image.tmdb.org/t/p/';
let mediaMode = 'film'; // 'film' eller 'serie'
let searchType = 'person';

const FILM_GENRES = [
  {id:28,name:'Action'},{id:12,name:'Eventyr'},{id:16,name:'Animasjon'},
  {id:35,name:'Komedie'},{id:80,name:'Krim'},{id:99,name:'Dokumentar'},
  {id:18,name:'Drama'},{id:10751,name:'Familie'},{id:14,name:'Fantasy'},
  {id:36,name:'Historie'},{id:27,name:'Skrekk'},{id:10402,name:'Musikk'},
  {id:9648,name:'Mysterium'},{id:10749,name:'Romantikk'},{id:878,name:'Science fiction'},
  {id:53,name:'Thriller'},{id:10752,name:'Krig'},{id:37,name:'Western'}
];
const SERIE_GENRES = [
  {id:10759,name:'Action & eventyr'},{id:16,name:'Animasjon'},{id:35,name:'Komedie'},
  {id:80,name:'Krim'},{id:99,name:'Dokumentar'},{id:18,name:'Drama'},
  {id:10751,name:'Familie'},{id:10762,name:'Barn'},{id:9648,name:'Mysterium'},
  {id:10763,name:'Nyheter'},{id:10764,name:'Reality'},{id:10765,name:'Science fiction & fantasy'},
  {id:10766,name:'Såpeopera'},{id:10767,name:'Talkshow'},{id:10768,name:'Krig & politikk'},
  {id:37,name:'Western'}
];

function setMedia(mode) {
  mediaMode = mode;
  const isFilm = mode === 'film';
  document.getElementById('mtab-film').className = 'media-tab' + (isFilm ? ' active-film' : '');
  document.getElementById('mtab-serie').className = 'media-tab' + (!isFilm ? ' active-serie' : '');
  document.getElementById('main').className = 'main mode-' + mode;
  document.getElementById('search-btn').className = 'btn btn-' + mode;
  // Oppdater søke-tab-stiler
  ['tab-person','tab-title','tab-discover'].forEach(id => {
    const el = document.getElementById(id);
    el.className = 'tab' + (el.classList.contains('active-film') || el.classList.contains('active-serie')
      ? ' active-' + mode : '');
  });
  // Oppdater rolle-label
  const roleSelect = document.getElementById('role-select');
  if (isFilm) {
    roleSelect.options[0].text = 'Regissør';
    document.getElementById('query-person').placeholder = 'F.eks. David Fincher';
    document.getElementById('query-title').placeholder = 'F.eks. Fight Club';
  } else {
    roleSelect.options[0].text = 'Skaper / showrunner';
    document.getElementById('query-person').placeholder = 'F.eks. Vince Gilligan';
    document.getElementById('query-title').placeholder = 'F.eks. Breaking Bad';
  }
  // Oppdater sjangerliste
  loadGenres();
  // Tøm resultater
  document.getElementById('results').innerHTML = '';
  showStatus('');
}

function loadGenres() {
  const genres = mediaMode === 'film' ? FILM_GENRES : SERIE_GENRES;
  const sel = document.getElementById('genre-select');
  sel.innerHTML = '<option value="">Alle sjangere</option>';
  genres.forEach(g => {
    const o = document.createElement('option');
    o.value = g.id; o.textContent = g.name; sel.appendChild(o);
  });
}

function setType(t) {
  searchType = t;
  ['person','title','discover'].forEach(x => {
    const tab = document.getElementById('tab-' + x);
    const isActive = x === t;
    tab.className = 'tab' + (isActive ? ' active-' + mediaMode : '');
    document.getElementById('row-' + x).style.display = isActive ? '' : 'none';
  });
}

async function tmdb(path) {
  const r = await fetch('https://api.themoviedb.org/3' + path, { headers: H });
  return r.json();
}

function showStatus(msg) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.style.display = msg ? 'block' : 'none';
}

function getProviders(no) {
  const free = no.free || [];
  const flatrate = no.flatrate || [];
  const seen = new Set();
  return [...free, ...flatrate].filter(p => {
    if (seen.has(p.provider_id)) return false;
    seen.add(p.provider_id); return true;
  });
}

async function search() {
  const minScore = parseFloat(document.getElementById('min-score').value) || 0;
  document.getElementById('results').innerHTML = '';
  showStatus('Søker...');
  const type = mediaMode === 'film' ? 'movie' : 'tv';
  try {
    if (searchType === 'person') {
      const q = document.getElementById('query-person').value.trim();
      if (!q) { showStatus('Skriv inn et navn.'); return; }
      await byPerson(q, document.getElementById('role-select').value, minScore, type);
    } else if (searchType === 'title') {
      const q = document.getElementById('query-title').value.trim();
      if (!q) { showStatus('Skriv inn en tittel.'); return; }
      await byTitle(q, minScore, type);
    } else {
      await byDiscover(minScore, type);
    }
  } catch(e) { showStatus('Feil: ' + e.message); }
}

async function byPerson(name, role, minScore, type) {
  const d = await tmdb('/search/person?query=' + encodeURIComponent(name) + '&language=no-NO');
  if (!d.results || !d.results.length) { showStatus('Ingen person funnet.'); return; }
  const person = d.results[0];
  const cd = await tmdb('/person/' + person.id + '/' + type + '_credits?language=no-NO');
  let list;
  if (type === 'movie') {
    list = role === 'directing'
      ? (cd.crew || []).filter(x => x.job === 'Director')
      : (cd.cast || []);
  } else {
    // For serier: directing = created_by finnes ikke i credits, bruk crew med Creator/Executive Producer
    list = role === 'directing'
      ? (cd.crew || []).filter(x => ['Creator','Executive Producer','Series Director'].includes(x.job))
      : (cd.cast || []);
    if (role === 'directing' && !list.length) list = cd.crew || [];
  }
  const filtered = list
    .filter(m => m.vote_average >= minScore && m.vote_count > 20)
    .sort((a, b) => b.vote_average - a.vote_average);
  showStatus('');
  if (!filtered.length) { showStatus('Ingen resultater over ' + minScore + ' for ' + person.name + '.'); return; }
  render(filtered.slice(0, 40), type);
}

async function byTitle(title, minScore, type) {
  const d = await tmdb('/search/' + type + '?query=' + encodeURIComponent(title) + '&language=no-NO');
  const filtered = (d.results || []).filter(m => m.vote_average >= minScore);
  showStatus('');
  if (!filtered.length) { showStatus('Ingen resultater funnet.'); return; }
  render(filtered, type);
}

async function byDiscover(minScore, type) {
  const genre = document.getElementById('genre-select').value;
  const decade = document.getElementById('decade-select').value;
  const dateField = type === 'movie' ? 'primary_release_date' : 'first_air_date';
  let url = '/discover/' + type + '?language=no-NO&sort_by=vote_average.desc&vote_count.gte=100&vote_average.gte=' + minScore;
  if (genre) url += '&with_genres=' + genre;
  if (decade) url += '&' + dateField + '.gte=' + decade + '-01-01&' + dateField + '.lte=' + (parseInt(decade)+9) + '-12-31';
  const d = await tmdb(url);
  showStatus('');
  if (!d.results || !d.results.length) { showStatus('Ingen resultater funnet.'); return; }
  render(d.results.slice(0, 40), type);
}

function getTitle(item, type) {
  return type === 'movie' ? (item.title || item.original_title) : (item.name || item.original_name);
}

function getYear(item, type) {
  const date = type === 'movie' ? item.release_date : item.first_air_date;
  return date ? date.slice(0,4) : '—';
}

function render(items, type) {
  const scoreClass = 'score score-' + mediaMode;
  document.getElementById('results').innerHTML = items.map(m => {
    const title = getTitle(m, type);
    const year = getYear(m, type);
    return '<div class="card" onclick="openModal(' + m.id + ',\'' + type + '\')" title="' + title.replace(/"/g,'') + '">' +
      (m.poster_path
        ? '<img src="' + IMG + 'w300' + m.poster_path + '" alt="" loading="lazy"/>'
        : '<div class="no-poster">' + (type === 'movie' ? '🎬' : '📺') + '</div>') +
      '<div class="card-info">' +
      '<div class="' + scoreClass + '">★ ' + m.vote_average.toFixed(1) + '</div>' +
      '<div class="card-title">' + title + '</div>' +
      '<div class="card-year">' + year + '</div>' +
      '<div class="card-providers" id="prov-' + m.id + '"></div>' +
      '</div></div>';
  }).join('');
  fetchProvidersBatch(items, type);
}

function providerLogoHtml(p) {
  return p.logo_path
    ? '<img src="' + IMG + 'w45' + p.logo_path + '" title="' + p.provider_name + '" style="width:18px;height:18px;border-radius:3px;object-fit:cover;display:inline-block;vertical-align:middle;"/>'
    : '<span style="font-size:10px;color:var(--text-dim)">' + p.provider_name + '</span>';
}

async function fetchProvidersBatch(items, type) {
  for (const m of items) {
    try {
      const wp = await tmdb('/' + type + '/' + m.id + '/watch/providers');
      const no = (wp.results && wp.results.NO) || {};
      const providers = getProviders(no);
      const el = document.getElementById('prov-' + m.id);
      if (!el) continue;
      const html = providers.slice(0,5).map(providerLogoHtml).join('');
      if (html) el.innerHTML = html;
    } catch(e) {}
  }
}

async function openModal(id, type) {
  document.getElementById('overlay').classList.add('open');
  document.getElementById('modal-inner').innerHTML = '<div style="padding:3rem;text-align:center;color:#555">Laster...</div>';
  const [m, wp, cr] = await Promise.all([
    tmdb('/' + type + '/' + id + '?language=no-NO'),
    tmdb('/' + type + '/' + id + '/watch/providers'),
    tmdb('/' + type + '/' + id + '/credits?language=no-NO'),
  ]);
  const no = (wp.results && wp.results.NO) || {};
  const free = no.free || [];
  const flatrate = no.flatrate || [];
  const rent = no.rent || [];

  const title = type === 'movie' ? m.title : m.name;
  const year = type === 'movie'
    ? (m.release_date ? m.release_date.slice(0,4) : '')
    : (m.first_air_date ? m.first_air_date.slice(0,4) : '');

  // Ekstra info avhengig av type
  let extraInfo = '';
  if (type === 'movie') {
    const director = (cr.crew || []).find(x => x.job === 'Director');
    if (director) extraInfo += '<div class="section-label">Regissør</div><div class="modal-text">' + director.name + '</div>';
    if (m.runtime) extraInfo += '<div class="section-label">Spilletid</div><div class="modal-text">' + Math.floor(m.runtime/60) + 't ' + (m.runtime%60) + 'min</div>';
  } else {
    const creators = (m.created_by || []).map(x => x.name).join(', ');
    if (creators) extraInfo += '<div class="section-label">Skaper</div><div class="modal-text">' + creators + '</div>';
    const seasons = m.number_of_seasons;
    const episodes = m.number_of_episodes;
    if (seasons) extraInfo += '<div class="section-label">Sesonger</div><div class="modal-text">' + seasons + ' sesong' + (seasons > 1 ? 'er' : '') + (episodes ? ' · ' + episodes + ' episoder' : '') + '</div>';
    const status = m.status === 'Ended' ? 'Avsluttet' : m.status === 'Returning Series' ? 'Pågående' : m.status || '';
    if (status) extraInfo += ' <span style="font-size:11px;color:var(--text-dim)">(' + status + ')</span>';
  }

  const cast = (cr.cast || []).slice(0,5).map(x => x.name).join(', ');
  const genres = (m.genres || []).map(g => g.name).join(', ');

  // IMDb via OMDb
  let imdbRating = null, rtRating = null;
  const imdbId = m.imdb_id || (m.external_ids && m.external_ids.imdb_id);
  if (imdbId) {
    try {
      const od = await fetch('https://www.omdbapi.com/?i=' + imdbId + '&apikey=' + OMDB_KEY).then(r => r.json());
      if (od.imdbRating && od.imdbRating !== 'N/A') imdbRating = od.imdbRating;
      const rt = (od.Ratings || []).find(r => r.Source === 'Rotten Tomatoes');
      if (rt) rtRating = rt.Value;
    } catch(e) {}
  }

  const pillClass = 'score-pill score-pill-' + mediaMode;

  function providerBlock(p, label) {
    return '<div class="provider">' +
      (p.logo_path ? '<img src="' + IMG + 'w45' + p.logo_path + '" alt="' + p.provider_name + '"/>' : '') +
      p.provider_name +
      (label ? '<span class="provider-label">' + label + '</span>' : '') +
      '</div>';
  }

  let providersHtml = '';
  if (free.length) providersHtml += free.map(p => providerBlock(p, 'Gratis')).join('');
  if (flatrate.length) {
    const seen = new Set(free.map(p => p.provider_id));
    flatrate.filter(p => !seen.has(p.provider_id)).forEach(p => { providersHtml += providerBlock(p, ''); });
  }
  if (rent.length) providersHtml += rent.slice(0,4).map(p => providerBlock(p, 'Leie')).join('');

  document.getElementById('modal-inner').innerHTML =
    (m.backdrop_path
      ? '<img src="' + IMG + 'w780' + m.backdrop_path + '" class="modal-poster" alt=""/>'
      : m.poster_path ? '<img src="' + IMG + 'w500' + m.poster_path + '" class="modal-poster" alt=""/>' : '') +
    '<div class="modal-body">' +
    '<div class="modal-title">' + title + (year ? ' <span style="font-weight:400;color:#666">(' + year + ')</span>' : '') + '</div>' +
    '<div class="modal-scores">' +
    (imdbRating ? '<span class="' + pillClass + '">★ ' + imdbRating + ' IMDb</span>' : '') +
    (rtRating ? '<span class="score-pill rt">🍅 ' + rtRating + '</span>' : '') +
    '<span class="' + pillClass + '" style="opacity:0.6">TMDB ' + m.vote_average.toFixed(1) + '</span>' +
    '</div>' +
    extraInfo +
    (cast ? '<div class="section-label">Skuespillere</div><div class="modal-text">' + cast + '</div>' : '') +
    (genres ? '<div class="section-label">Sjanger</div><div class="modal-text">' + genres + '</div>' : '') +
    (m.overview ? '<div class="section-label">Handling</div><div class="modal-text">' + m.overview + '</div>' : '') +
    '<div class="section-label">Tilgjengelig i Norge</div>' +
    (providersHtml
      ? '<div class="providers">' + providersHtml + '</div>'
      : '<div class="no-providers">Ikke funnet på norske strømmetjenester</div>') +
    (no.link ? '<a href="' + no.link + '" target="_blank" rel="noopener" class="justwatch-link">Se alle tilbud på JustWatch →</a>' : '') +
    '</div>';
}

function closeModal() { document.getElementById('overlay').classList.remove('open'); }
function handleOverlayClick(e) { if (e.target === document.getElementById('overlay')) closeModal(); }
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
document.getElementById('query-person').addEventListener('keydown', e => { if (e.key === 'Enter') search(); });
document.getElementById('query-title').addEventListener('keydown', e => { if (e.key === 'Enter') search(); });

setType('person');
loadGenres();
</script>
</body>
</html>
